<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Glowing Love Space 💖</title>
    
    <!-- Tailwind CSS for swift, ultra-responsive layout classes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        romantic: {
                            gold: '#FFD700',
                            burgundy: '#801435',
                            neonPink: '#ff4d8d',
                            neonCyan: '#00ffcc',
                            softPink: '#eb8cab'
                        }
                    },
                    fontFamily: {
                        romantic: ['"Dancing Script"', 'cursive'],
                        sans: ['"Quicksand"', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <!-- FontAwesome for cute indicators, hearts, and musical controls -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts for handwriting-style text and clean, modern reading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #eb8cab 0%, #fca5a5 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .romantic-title {
            font-family: 'Dancing Script', cursive;
        }

        /* Fixed glow animation with high visual depth matching the user's concept */
        .glow-box {
            background-color: #801435;
            color: #fff;
            text-shadow: 0 0 10px #ff4d8d, 0 0 20px #ff4d8d;
            box-shadow: 0 0 15px #00ffcc, 0 0 30px #00ffcc, inset 0 0 10px rgba(0, 255, 204, 0.3);
            animation: bounce 2.4s infinite ease-in-out;
            transition: all 0.3s ease;
        }

        .glow-box:hover {
            box-shadow: 0 0 25px #ff4d8d, 0 0 50px #ff4d8d;
            transform: scale(1.05);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Shared neon aesthetic for all containers */
        .text-box, .photo-box, .video-box {
            color: #00ffcc;
            background-color: rgba(0, 0, 0, 0.9);
            box-shadow: 0 0 15px #00ffcc, 0 0 30px rgba(0, 255, 204, 0.4);
            border: 1px solid rgba(0, 255, 204, 0.3);
            transition: all 0.5s ease-in-out;
        }

        .text-box:hover, .photo-box:hover, .video-box:hover {
            box-shadow: 0 0 25px #ff4d8d, 0 0 45px rgba(255, 77, 141, 0.6);
            border-color: rgba(255, 77, 141, 0.5);
            color: #fff;
        }

        /* Floating screen background elements */
        @keyframes float {
            0% { transform: translateY(110vh) scale(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1) rotate(360deg); opacity: 0; }
        }
        
        .floating-heart {
            position: fixed;
            bottom: -50px;
            color: rgba(255, 255, 255, 0.4);
            animation: float 8s linear infinite;
            z-index: 1;
            pointer-events: none;
        }

        /* Slideshow Frame & Video Slot Styles */
        .love-slideshow, .love-video-slot {
            position: relative;
            width: 115px;       
            height: 115px;      
            border-radius: 16px; 
            border: 2px solid rgba(255, 77, 141, 0.5); 
            box-shadow: 0 0 10px rgba(255, 77, 141, 0.3);
            transition: all 0.3s ease;
            overflow: hidden;   
            flex-shrink: 0;
        }

        .love-slideshow:hover, .love-video-slot:hover {
            transform: scale(1.08) rotate(2deg); 
            border-color: #00ffcc; 
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
        }

        /* Photo slide switching configuration */
        .love-slideshow img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; 
            opacity: 0;
            transition: opacity 1s ease-in-out;
            z-index: 1;
        }

        .love-slideshow img.active {
            opacity: 1;
            z-index: 2;
        }

        /* Video element rendering configuration */
        .love-video-slot video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Placeholders for blank states */
        .photo-placeholder, .video-placeholder {
            background-color: #1f1f1f;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .photo-placeholder::before {
            content: "\f03e";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            color: #444;
            font-size: 1.8rem;
            position: absolute;
        }
        .video-placeholder::before {
            content: "\f03d";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            color: #444;
            font-size: 1.8rem;
            position: absolute;
            z-index: 0;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-between py-12 px-4 relative">

    <!-- Floating Hearts Container -->
    <div id="hearts-background" class="fixed inset-0 overflow-hidden pointer-events-none z-0"></div>

    <!-- Hidden audio element with default licensing-free relaxing track -->
    <audio id="bg-audio" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"></audio>

    <!-- Floating Audio Switcher -->
    <div class="fixed top-6 right-6 z-50">
        <button id="audio-control" onclick="toggleAudio()" class="w-12 h-12 rounded-full bg-white/20 backdrop-blur-md border border-white/40 flex items-center justify-center text-white text-lg shadow-lg hover:bg-white/40 transition-all transform hover:scale-110 cursor-pointer">
            <i id="audio-icon" class="fa-solid fa-music"></i>
        </button>
    </div>

    <!-- Main Content Container: Expanded to max-w-6xl for beautiful 3-column distribution -->
    <div class="w-full max-w-6xl flex flex-col items-center justify-center gap-10 z-10 my-auto">
        
        <!-- Interactive Glowing Header -->
        <div class="glow-box px-8 py-4 rounded-full text-2xl font-bold cursor-pointer select-none" onclick="triggerHeartBurst(event)">
            To My Love <i class="fa-solid fa-heart ml-1 text-red-500 animate-pulse"></i>
        </div>

        <!-- THREE-COLUMN SYMMETRIC WRAPPER (Photos - Text - Videos) -->
        <div class="w-full flex flex-col lg:flex-row gap-10 lg:gap-12 items-stretch justify-center">
            
            <!-- (1) KALIWANG BOX: Vertical Photo Slideshows -->
            <div class="photo-box p-6 rounded-2xl flex flex-row lg:flex-col gap-5 justify-center items-center lg:w-48 shrink-0 overflow-x-auto lg:overflow-x-visible">
                <div class="love-slideshow photo-placeholder">
                    <img src="" alt="Slot 1 - Photo 1" class="active">
                    <img src="" alt="Slot 1 - Photo 2">
                    <img src="" alt="Slot 1 - Photo 3">
                    <img src="" alt="Slot 1 - Photo 4">
                    <img src="" alt="Slot 1 - Photo 5">
                </div>
                <div class="love-slideshow photo-placeholder">
                    <img src="" alt="Slot 2 - Photo 1" class="active">
                    <img src="" alt="Slot 2 - Photo 2">
                    <img src="" alt="Slot 2 - Photo 3">
                    <img src="" alt="Slot 2 - Photo 4">
                    <img src="" alt="Slot 2 - Photo 5">
                </div>
                <div class="love-slideshow photo-placeholder">
                    <img src="" alt="Slot 3 - Photo 1" class="active">
                    <img src="" alt="Slot 3 - Photo 2">
                    <img src="" alt="Slot 3 - Photo 3">
                    <img src="" alt="Slot 3 - Photo 4">
                    <img src="" alt="Slot 3 - Photo 5">
                </div>
                <div class="love-slideshow photo-placeholder">
                    <img src="" alt="Slot 4 - Photo 1" class="active">
                    <img src="" alt="Slot 4 - Photo 2">
                    <img src="" alt="Slot 4 - Photo 3">
                    <img src="" alt="Slot 4 - Photo 4">
                    <img src="" alt="Slot 4 - Photo 5">
                </div>
            </div>

            <!-- (2) GITNANG BOX: Ang Liham at Magic Button -->
            <div class="text-box flex-grow p-6 md:p-8 rounded-2xl flex flex-col items-center justify-between text-center min-h-[300px] relative">
                <div class="absolute -top-3 -left-3 text-romantic-neonCyan text-xl opacity-60"><i class="fa-solid fa-quote-left"></i></div>
                <div class="absolute -bottom-3 -right-3 text-romantic-neonCyan text-xl opacity-60"><i class="fa-solid fa-quote-right"></i></div>

                <div class="flex-grow flex items-center justify-center py-4 w-full">
                    <p id="typed-message" class="text-lg md:text-xl font-semibold leading-relaxed tracking-wide text-white">
                        I-click ang button sa ibaba para sa aking maikling liham para sa iyo... 💖
                    </p>
                </div>

                <button onclick="changeMessage()" class="mt-4 bg-gradient-to-r from-teal-400 to-cyan-400 text-slate-900 font-bold px-6 py-2.5 rounded-full shadow-lg hover:from-pink-400 hover:to-rose-400 hover:text-white transition-all transform hover:scale-105 active:scale-95 cursor-pointer text-sm tracking-wider uppercase z-10">
                    <i class="fa-solid fa-wand-magic-sparkles mr-2"></i> Reveal Message
                </button>
            </div>

            <!-- (3) KANANG BOX: Ang Bagong Vertical Video Slots -->
            <!-- Nakadisenyo katulad ng sa kaliwa para sa perpektong symmetry -->
            <div class="video-box p-6 rounded-2xl flex flex-row lg:flex-col gap-5 justify-center items-center lg:w-48 shrink-0 overflow-x-auto lg:overflow-x-visible">
                
                <!-- Video Slot 1 (Ilagay ang mp4 video file sa src="") -->
                <div class="love-video-slot video-placeholder">
                    <video src="" loop muted playsinline autoplay></video>
                </div>

                <!-- Video Slot 2 -->
                <div class="love-video-slot video-placeholder">
                    <video src="" loop muted playsinline autoplay></video>
                </div>

                <!-- Video Slot 3 -->
                <div class="love-video-slot video-placeholder">
                    <video src="" loop muted playsinline autoplay></video>
                </div>

                <!-- Video Slot 4 -->
                <div class="love-video-slot video-placeholder">
                    <video src="" loop muted playsinline autoplay></video>
                </div>

            </div>

        </div>

        <!-- Custom Interactive Love Meter Game -->
        <div class="w-full max-w-lg bg-black/40 backdrop-blur-md p-6 rounded-2xl border border-white/20 text-center text-white">
            <h4 class="font-bold text-sm uppercase tracking-widest text-romantic-neonCyan mb-4">How Much Do You Love Me?</h4>
            <div class="flex items-center gap-4 mb-4">
                <span class="text-xs font-bold text-gray-300">1%</span>
                <input type="range" min="1" max="100" value="50" id="love-slider" oninput="updateLoveMeter(this.value)" class="w-full accent-pink-500 cursor-pointer">
                <span class="text-xs font-bold text-gray-300">100%</span>
            </div>
            <div id="love-status" class="text-lg font-bold text-white transition-all">
                Pindutin ang slider para ipadama ang pagmamahal! 🥰
            </div>
        </div>

    </div>

    <!-- Footer copyright info -->
    <footer class="text-center text-white/70 text-xs font-semibold mt-8 tracking-wider z-10">
        Made with love for you &copy; 2026.
    </footer>

    <script>
        // Array of custom love declarations
        const romanticMessages = [
            "Araw-araw kitang pipiliin, sa lahat ng bukas na darating. Ikaw ang aking tahanan. 🌸",
            "Salamat sa bawat ngiti, bawat tawa, at bawat yakap na nagpapakalma sa magulo kong mundo. ✨",
            "Kahit anong mangyari, laging tandaan na sapat ka, mahalaga ka, at mahal na mahal kita. 💕",
            "Ikaw ang paborito kong panalangin na natupad. Hinding-hindi ako mapapagod mahalin ka. 🥂",
            "Sa hirap at ginhawa, magkahawak-kamay nating haharapin ang bawat pakikipagsapalaran ng buhay. 🌠"
        ];

        let messageIndex = 0;
        let typingTimeout = null;

        function changeMessage() {
            const displayArea = document.getElementById('typed-message');
            const selectedText = romanticMessages[messageIndex];
            messageIndex = (messageIndex + 1) % romanticMessages.length;
            
            if (typingTimeout) clearTimeout(typingTimeout);
            
            displayArea.innerHTML = "";
            let charIndex = 0;
            
            function typeCharacter() {
                if (charIndex < selectedText.length) {
                    displayArea.innerHTML += selectedText.charAt(charIndex);
                    charIndex++;
                    typingTimeout = setTimeout(typeCharacter, 35);
                }
            }
            typeCharacter();
            triggerManualBurst();
        }

        function updateLoveMeter(val) {
            const statusDisplay = document.getElementById('love-status');
            if (val < 30) {
                statusDisplay.innerHTML = `Medyo mahina yata, love! Taasan mo pa! 🥺 (${val}%)`;
                statusDisplay.className = "text-lg font-bold text-amber-300 transition-all";
            } else if (val >= 30 && val < 80) {
                statusDisplay.innerHTML = `Salamat sa pagmamahal! Palapit na tayo sa walang hanggan! 🥰 (${val}%)`;
                statusDisplay.className = "text-lg font-bold text-romantic-softPink transition-all";
            } else if (val >= 80 && val < 100) {
                statusDisplay.innerHTML = `Grabe ang init ng pagmamahal mo! Mahal na mahal din kita! 🔥 (${val}%)`;
                statusDisplay.className = "text-lg font-bold text-romantic-neonPink transition-all";
            } else {
                statusDisplay.innerHTML = `Sobra-sobra hanggang langit at kalawakan! Ikaw na talaga! 🚀💖 (${val}%)`;
                statusDisplay.className = "text-xl font-extrabold text-romantic-gold animate-bounce transition-all";
                triggerManualBurst();
            }
        }

        const audioFile = document.getElementById('bg-audio');
        const audioIcon = document.getElementById('audio-icon');

        function toggleAudio() {
            if (audioFile.paused) {
                audioFile.play().then(() => {
                    audioIcon.className = "fa-solid fa-volume-high animate-bounce text-pink-300";
                }).catch(err => console.log("User interaction required to initiate media stream.", err));
            } else {
                audioFile.pause();
                audioIcon.className = "fa-solid fa-music";
            }
        }

        function generateFloatingHeart() {
            const background = document.getElementById('hearts-background');
            const heart = document.createElement('i');
            heart.classList.add('fa-solid', 'fa-heart', 'floating-heart');
            
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 4 + 5) + 's'; 
            heart.style.fontSize = (Math.random() * 14 + 10) + 'px'; 
            heart.style.color = `hsl(${Math.random() * 20 + 335}, 100%, ${Math.random() * 20 + 70}%)`; 
            
            background.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 9000);
        }
        setInterval(generateFloatingHeart, 500);

        function triggerHeartBurst(event) {
            const rect = event.currentTarget.getBoundingClientRect();
            spawnParticles(rect.left + rect.width / 2, rect.top + rect.height / 2);
        }

        function triggerManualBurst() {
            spawnParticles(window.innerWidth / 2, window.innerHeight * 0.4);
        }

        function spawnParticles(x, y) {
            const container = document.getElementById('hearts-background');
            for (let i = 0; i < 12; i++) {
                const p = document.createElement('i');
                p.classList.add('fa-solid', 'fa-heart', 'absolute', 'text-rose-500', 'pointer-events-none', 'z-40');
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.fontSize = '14px';
                
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 100 + 40;
                
                p.style.transition = "all 0.8s cubic-bezier(0.1, 0.8, 0.3, 1)";
                container.appendChild(p);
                
                setTimeout(() => {
                    p.style.transform = `translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance}px) scale(0)`;
                    p.style.opacity = '0';
                }, 50);
                setTimeout(() => { p.remove(); }, 900);
            }
        }

        // Photo Slideshow Control Engine
        function initSlideshows() {
            document.querySelectorAll('.love-slideshow').forEach((container) => {
                const images = container.querySelectorAll('img');
                if (images.length <= 1) return;
                let currentIdx = 0;
                setInterval(() => {
                    images[currentIdx].classList.remove('active');
                    currentIdx = (currentIdx + 1) % images.length;
                    images[currentIdx].classList.add('active');
                }, 3000 + Math.random() * 800);
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            initSlideshows();
            
            // Remove placeholders when photo loads
            document.querySelectorAll('.love-slideshow img').forEach(img => {
                img.onload = function() {
                    const parent = this.parentElement;
                    if(parent) parent.classList.remove('photo-placeholder');
                }
            });

            // Remove placeholders when video successfully plays
            document.querySelectorAll('.love-video-slot video').forEach(vid => {
                vid.addEventListener('playing', function() {
                    const parent = this.parentElement;
                    if(parent) parent.classList.remove('video-placeholder');
                });
            });
        });
    </script>
</body>
</html>
